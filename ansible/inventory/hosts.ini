# NexusLiberty — WAS ND Cell Ansible Inventory
# Targets Vagrant VMs simulating an IBM WAS ND environment
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/<playbook>.yml
#
# SSH config: Vagrant manages SSH keys automatically.
#   Use `vagrant ssh-config` to generate ~/.ssh/config entries if needed.

[dmgr]
nexus-dmgr  ansible_host=192.168.56.10

[was_nodes]
nexus-was1  ansible_host=192.168.56.11
nexus-was2  ansible_host=192.168.56.12

[ihs]
nexus-ihs   ansible_host=192.168.56.13

# --- Logical groupings ---

# All WAS servers (Dmgr + managed nodes)
[was:children]
dmgr
was_nodes

# Full cell (WAS + IHS)
[was_cell:children]
was
ihs

# Cluster members only (for app deployment targeting)
[cluster:children]
was_nodes
