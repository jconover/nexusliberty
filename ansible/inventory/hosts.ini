# NexusLiberty — WAS ND Cell Ansible Inventory
# Targets Vagrant VMs simulating an IBM WAS ND environment
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/<playbook>.yml
#
# SSH config: Vagrant manages SSH keys automatically.
#   Use `vagrant ssh-config` to generate ~/.ssh/config entries if needed.

[dmgr]
nexus-dmgr  ansible_host=192.168.121.157  ansible_ssh_private_key_file=../vagrant/.vagrant/machines/nexus-dmgr/libvirt/private_key

[was_nodes]
nexus-was1  ansible_host=192.168.121.78   ansible_ssh_private_key_file=../vagrant/.vagrant/machines/nexus-was1/libvirt/private_key
nexus-was2  ansible_host=192.168.121.22   ansible_ssh_private_key_file=../vagrant/.vagrant/machines/nexus-was2/libvirt/private_key

[ihs]
nexus-ihs   ansible_host=192.168.121.57   ansible_ssh_private_key_file=../vagrant/.vagrant/machines/nexus-ihs/libvirt/private_key

# --- Logical groupings ---

# All WAS servers (Dmgr + managed nodes)
[was:children]
dmgr
was_nodes

# Full cell (WAS + IHS)
[was_cell:children]
was
ihs

# Cluster members only (for app deployment targeting)
[cluster:children]
was_nodes
