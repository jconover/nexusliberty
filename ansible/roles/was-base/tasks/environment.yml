---
# was-base/tasks/environment.yml — Configure system-wide WAS environment

- name: Deploy WAS environment profile script
  ansible.builtin.template:
    src: was-env.sh.j2
    dest: "{{ was_env_script }}"
    owner: root
    group: root
    mode: "0644"

- name: Configure /etc/hosts for WAS cell members
  ansible.builtin.blockinfile:
    path: /etc/hosts
    block: |
      {{ hostvars[groups['dmgr'][0]]['ansible_host'] }}  nexus-dmgr.{{ domain }}  nexus-dmgr
      {{ hostvars[groups['was_nodes'][0]]['ansible_host'] }}  nexus-was1.{{ domain }}   nexus-was1
      {{ hostvars[groups['was_nodes'][1]]['ansible_host'] }}  nexus-was2.{{ domain }}   nexus-was2
      {{ hostvars[groups['ihs'][0]]['ansible_host'] }}  nexus-ihs.{{ domain }}    nexus-ihs
    marker: "# {mark} ANSIBLE MANAGED — WAS cell hosts"
