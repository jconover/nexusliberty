---
# was-nodeagent/handlers/main.yml

- name: Restart nodeagent
  ansible.builtin.shell: |
    set -e
    {{ was_profile_path }}/bin/stopNode.sh
    sleep 2
    {{ was_profile_path }}/bin/startNode.sh
  become: true
  become_user: "{{ was_user }}"
  changed_when: true

- name: Restart appserver
  ansible.builtin.shell: |
    set -e
    {{ was_profile_path }}/bin/stopServer.sh {{ was_server_name }}
    sleep 2
    {{ was_profile_path }}/bin/startServer.sh {{ was_server_name }}
  become: true
  become_user: "{{ was_user }}"
  changed_when: true
