---
# ServiceAccount for GitHub ARC runner pods.
# Runner pods run under this identity, which is bound to the github-runner-ci
# ClusterRole (rbac.yaml) for scoped cross-namespace CI operations, and to the
# github-arc SCC (scc.yaml) for the required UID 1001 / GID 123 security context.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner-sa
  namespace: github-runner
  labels:
    app.kubernetes.io/part-of: nexusliberty
    app.kubernetes.io/component: ci
