---
# Headless Service for Liberty pods — returns individual pod IPs
# instead of a single ClusterIP. Used by IHS (mod_proxy_balancer)
# to discover and load-balance across Liberty instances directly.
apiVersion: v1
kind: Service
metadata:
  name: nexusliberty-app-headless
  namespace: liberty-apps
  labels:
    app.kubernetes.io/name: nexusliberty-app
    app.kubernetes.io/part-of: nexusliberty
    app.kubernetes.io/component: headless-discovery
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: nexusliberty-app
  ports:
    - name: http
      port: 9080
      targetPort: 9080
    - name: https
      port: 9443
      targetPort: 9443
