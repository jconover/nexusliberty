apiVersion: liberty.websphere.ibm.com/v1
kind: WebSphereLibertyApplication
metadata:
  name: nexusliberty-app
  namespace: liberty-apps
  labels:
    app.kubernetes.io/name: nexusliberty-app
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: nexusliberty
    app.kubernetes.io/component: backend
spec:
  license:
    accept: true
    edition: IBM WebSphere Application Server
  applicationImage: ghcr.io/jconover/nexusliberty-app:sha-eb457998613ec2c3834f9b0f7667d73443b98818
  replicas: 2
  serviceAccountName: nexusliberty-sa
  expose: true
  route:
    termination: edge
  service:
    port: 9080
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: nexusliberty-app
            topologyKey: kubernetes.io/hostname
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9080
    initialDelaySeconds: 30
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health/live
      port: 9080
    initialDelaySeconds: 60
    periodSeconds: 30
  startupProbe:
    httpGet:
      path: /health/live
      port: 9080
    failureThreshold: 30
    periodSeconds: 10
  env:
    - name: WLP_LOGGING_CONSOLE_FORMAT
      value: json
    - name: WLP_LOGGING_CONSOLE_LOGLEVEL
      value: info
