apiVersion: liberty.websphere.ibm.com/v1
kind: WebSphereLibertyApplication
metadata:
  name: nexusliberty-sample
  namespace: liberty-apps
spec:
  license:
    accept: true
    edition: IBM WebSphere Application Server
    productEntitlementSource: Standalone
  # Use IBM's official sample getting-started image to prove end-to-end
  applicationImage: icr.io/appcafe/open-liberty/samples/getting-started
  replicas: 1
  expose: true
  route:
    termination: edge
  service:
    port: 9080
  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9080
    initialDelaySeconds: 30
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health/live
      port: 9080
    initialDelaySeconds: 60
    periodSeconds: 30
  env:
    - name: WLP_LOGGING_CONSOLE_FORMAT
      value: json
    - name: WLP_LOGGING_CONSOLE_LOGLEVEL
      value: info
