---
# ServiceAccount for Liberty pods — used by Hazelcast Kubernetes
# discovery to list/get peer pods for session replication.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexusliberty-sa
  namespace: liberty-apps
  labels:
    app.kubernetes.io/name: nexusliberty-app
    app.kubernetes.io/part-of: nexusliberty

---
# Role granting pod discovery — minimum RBAC for Hazelcast K8s plugin.
# Scoped to liberty-apps namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nexusliberty-pod-reader
  namespace: liberty-apps
  labels:
    app.kubernetes.io/name: nexusliberty-app
    app.kubernetes.io/part-of: nexusliberty
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list"]

---
# Bind the role to the Liberty service account.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexusliberty-pod-reader-binding
  namespace: liberty-apps
  labels:
    app.kubernetes.io/name: nexusliberty-app
    app.kubernetes.io/part-of: nexusliberty
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nexusliberty-pod-reader
subjects:
  - kind: ServiceAccount
    name: nexusliberty-sa
    namespace: liberty-apps
