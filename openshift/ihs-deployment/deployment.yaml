---
# IHS Load Balancer Deployment — reverse proxies to Liberty pods
# Replicates the traditional WAS ND + IHS pattern on OKD.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusliberty-ihs
  namespace: liberty-apps
  labels:
    app.kubernetes.io/name: nexusliberty-ihs
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: nexusliberty
    app.kubernetes.io/component: load-balancer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexusliberty-ihs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexusliberty-ihs
        app.kubernetes.io/part-of: nexusliberty
        app.kubernetes.io/component: load-balancer
    spec:
      containers:
        - name: ihs
          image: ghcr.io/jconover/nexusliberty-ihs:latest
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ihs-health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ihs-health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
