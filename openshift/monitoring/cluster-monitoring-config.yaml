---
# Enable user workload monitoring on OKD.
# Apply to openshift-monitoring namespace (cluster-admin required):
#   oc apply -f openshift/monitoring/cluster-monitoring-config.yaml -n openshift-monitoring
#
# This allows Prometheus to scrape ServiceMonitors in user namespaces
# like liberty-apps. Without this, only cluster-level metrics are collected.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
data:
  config.yaml: |
    enableUserWorkload: true
