name: Liberty CI — Quality Gates + Tekton Trigger

on:
  push:
    branches:
      - main
    paths:
      - 'docker/liberty-app/**'
      - 'app/**'
  pull_request:
    paths:
      - 'docker/liberty-app/**'
      - 'app/**'

permissions:
  contents: read

jobs:
  # Pre-merge quality gates — run on every push and PR
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven build and unit tests
        working-directory: app
        run: mvn clean verify

      - name: Dockerfile lint (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/liberty-app/Dockerfile
          failure-threshold: warning

  # Post-merge only — trigger Tekton pipeline on the OKD cluster
  trigger-tekton:
    needs: quality-gates
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OKD
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OKD_SERVER_URL }}
          openshift_token: ${{ secrets.OKD_TOKEN }}

      - name: Trigger Tekton PipelineRun
        run: oc create -f openshift/pipelines/06-pipelinerun-template.yaml -n liberty-apps

      - name: Report PipelineRun status
        run: |
          PIPELINE_RUN=$(oc get pipelinerun -n liberty-apps --sort-by=.metadata.creationTimestamp -o name | tail -1)
          echo "Started: ${PIPELINE_RUN}"
          oc get "${PIPELINE_RUN}" -n liberty-apps
