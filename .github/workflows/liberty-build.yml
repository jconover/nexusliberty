name: Build and Push Liberty Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/liberty-app/**'
      - 'app/**'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jconover/nexusliberty-app
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push Liberty image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/liberty-app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update manifest with new image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|applicationImage: ghcr.io/jconover/nexusliberty-app:.*|applicationImage: ghcr.io/jconover/nexusliberty-app:sha-${SHORT_SHA}|" \
            openshift/liberty-deployment/WebSphereLibertyApplication.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openshift/liberty-deployment/WebSphereLibertyApplication.yaml
          git diff --staged --quiet || git commit -m "ci: update Liberty image tag to sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          git push
