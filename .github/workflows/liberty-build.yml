name: Liberty CI — Quality Gates + Tekton Trigger

on:
  push:
    branches:
      - main
    paths:
      - 'docker/liberty-app/**'
      - 'app/**'
  pull_request:
    paths:
      - 'docker/liberty-app/**'
      - 'app/**'

permissions:
  contents: read

jobs:
  # Pre-merge quality gates — run on every push and PR
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven build and unit tests
        working-directory: app
        run: mvn clean verify

      - name: Dockerfile lint (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/liberty-app/Dockerfile
          failure-threshold: warning

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/jconover/nexusliberty-app:sha-${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  # Post-merge only — trigger Tekton pipeline on the OKD cluster
  trigger-tekton:
    needs: quality-gates
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@8f59d06a9eebd2d343f4b9d31a92af0203825fd5 # v1.9.2
        with:
          oc: latest

      - name: Login to OKD
        uses: redhat-actions/oc-login@5eb45e848b168b6bf6b8fe7f1561003c12e3c99d # v1.3
        with:
          openshift_server_url: ${{ secrets.OKD_SERVER_URL }}
          openshift_token: ${{ secrets.OKD_TOKEN }}

      - name: Trigger Tekton PipelineRun
        run: oc create -f openshift/pipelines/06-pipelinerun-template.yaml -n liberty-apps

      - name: Report PipelineRun status
        run: |
          PIPELINE_RUN=$(oc get pipelinerun -n liberty-apps --sort-by=.metadata.creationTimestamp -o name | tail -1)
          echo "Started: ${PIPELINE_RUN}"
          oc get "${PIPELINE_RUN}" -n liberty-apps
